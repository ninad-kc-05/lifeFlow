<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeFlow – Available Donors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
        <img src="logo.jpeg" alt="LifeFlow">
    </div>
    <div class="nav-links">
        <button onclick="goAdminRequests()">Back to Requests</button>
    </div>
</div>

<div class="container card-panel card-wide card-table-wide">
    <h2 class="section-title">Available <span>Donors</span></h2>
    <p class="text-muted mt-sm">Donors matching the requested blood group and currently available.</p>
    <p id="assignmentInfo" class="text-muted" style="margin-top:0.35rem;"></p>

    <div class="card-panel mt-sm" style="padding:0.75rem;">
        <h3 style="margin:0 0 0.45rem 0; font-size:1rem;">Request Context</h3>
        <p id="requestMeta" class="text-muted" style="margin:0;"></p>
        <p id="requestSpecialNote" class="text-muted" style="margin:0.45rem 0 0 0;"></p>
    </div>

    <div class="card-panel mt-sm" style="padding:0.75rem;">
        <h3 style="margin:0 0 0.45rem 0; font-size:1rem;">Filters</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:0.6rem; align-items:end;">
            <div>
                <label for="sortField">Sort By</label>
                <select id="sortField">
                    <option value="score">Score</option>
                    <option value="last_donation_date">Last Donation Date</option>
                </select>
            </div>
            <div>
                <label for="sortOrder">Order</label>
                <select id="sortOrder">
                    <option value="desc">Descending</option>
                    <option value="asc">Ascending</option>
                </select>
            </div>
            <label style="display:flex; gap:0.45rem; align-items:center; margin-bottom:0.2rem; font-size:0.88rem; color:#334155;">
                <input id="highestScoreOnly" type="checkbox" />
                Highest Score Only
            </label>
        </div>
    </div>

    <div style="margin-top:1rem; overflow-x:auto;">
    <table style="width:100%; min-width:1400px; border-collapse:collapse; font-size:0.9rem;">
        <thead>
            <tr style="text-align:left; border-bottom:1px solid #1f2937;">
                <th style="padding:0.5rem 0.25rem;">Name</th>
                <th style="padding:0.5rem 0.25rem;">Blood Group</th>
                <th style="padding:0.5rem 0.25rem;">City</th>
                <th style="padding:0.5rem 0.25rem;">Last Donation</th>
                <th style="padding:0.5rem 0.25rem;">Match</th>
                <th style="padding:0.5rem 0.25rem;">Score</th>
                <th style="padding:0.5rem 0.25rem;">Rule Check</th>
                <th style="padding:0.5rem 0.25rem;">Survey Note</th>
                <th style="padding:0.5rem 0.25rem;">Status</th>
                <th style="padding:0.5rem 0.25rem;">Action</th>
            </tr>
        </thead>
        <tbody id="donorsBody"></tbody>
    </table>
    </div>
    <p id="donorsStatus" class="text-muted mt-sm"></p>
</div>

<div class="footer">
    &copy; 2025 LifeFlow | Blood Donation Management System
</div>

<script>
var API_BASE = "http://127.0.0.1:8000/api";
var REQUEST_ID = new URLSearchParams(window.location.search).get("request_id");
var ALL_DONORS = [];

function goHome() { window.location.href = "index.html"; }
function goAdminRequests() { window.location.href = "admin-requests.html"; }

function renderDonors(items) {
    var tbody = document.getElementById("donorsBody");
    if (!Array.isArray(items) || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="padding:2.5rem 1rem; text-align:center;">'
            + '<div style="color:#64748b; font-size:1.1rem; margin-bottom:1rem;">No matching donors found in this location.</div>'
            + '<button class="btn btn-primary" style="background:#10b981; border:none;" onclick="allotInventory(' + REQUEST_ID + ')">'
            + 'Allot from Inventory Instead</button>'
            + '</td></tr>';
        return;
    }

    tbody.innerHTML = items.map(function(item) {
        var statusText = String(item.response_status || "PENDING");
        var assignmentStatus = String(item.assignment_status || "").toLowerCase();
        var isAlreadyTesting = assignmentStatus === "testing" || assignmentStatus === "selected" || assignmentStatus === "completed" || statusText === "ACCEPTED";
        var action = isAlreadyTesting
            ? "Assigned"
            : '<button class="btn btn-primary btn-sm" onclick="assignDonor(' + item.id + ')">Assign</button>';

        return '<tr>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.name || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.blood_group || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.city || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.last_donation_date || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.match_type || "-") + ' / ' + (item.location_match || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.score != null ? item.score : "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.eligibility_reason || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;">' + (item.survey_note || "-") + '</td>'
            + '<td style="padding:0.45rem 0.25rem;"><span class="status-badge pending">' + statusText + '</span></td>'
            + '<td style="padding:0.45rem 0.25rem;">' + action + '</td>'
            + '</tr>';
    }).join('');
}

function parseDateValue(dateString) {
    if (!dateString) return null;
    var t = Date.parse(String(dateString) + "T00:00:00");
    return Number.isNaN(t) ? null : t;
}

function applyFilters() {
    var sortField = (document.getElementById("sortField") || { value: "score" }).value;
    var sortOrder = (document.getElementById("sortOrder") || { value: "desc" }).value;
    var highestOnly = !!(document.getElementById("highestScoreOnly") && document.getElementById("highestScoreOnly").checked);

    var filtered = ALL_DONORS.slice();

    if (highestOnly && filtered.length > 0) {
        var maxScore = Math.max.apply(null, filtered.map(function(item) {
            return Number(item.score || 0);
        }));
        filtered = filtered.filter(function(item) {
            return Number(item.score || 0) === maxScore;
        });
    }

    filtered.sort(function(a, b) {
        var left;
        var right;

        if (sortField === "last_donation_date") {
            left = parseDateValue(a.last_donation_date);
            right = parseDateValue(b.last_donation_date);

            if (left === null && right === null) return 0;
            if (left === null) return 1;
            if (right === null) return -1;
        } else {
            left = Number(a.score || 0);
            right = Number(b.score || 0);
        }

        return sortOrder === "asc" ? (left - right) : (right - left);
    });

    renderDonors(filtered);
}

function loadDonors() {
    if (!REQUEST_ID) {
        document.getElementById("donorsStatus").textContent = "Missing request_id in URL.";
        return;
    }

    var url = API_BASE + "/admin/requests/" + REQUEST_ID + "/donors/";

    document.getElementById("donorsStatus").textContent = "Loading donors...";
    fetch(url)
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
            if (!result.ok) {
                document.getElementById("donorsStatus").textContent = result.data && result.data.message ? result.data.message : "Failed to load donors.";
                return;
            }

            var payload = result.data || {};
            document.getElementById("requestMeta").textContent =
                "Patient: " + (payload.patient_name || "-") +
                " | Blood: " + (payload.blood_group || "-") +
                " | Component: " + (payload.component_type || "-") +
                " | City: " + (payload.city || "-");
            document.getElementById("requestSpecialNote").textContent =
                payload.special_note ? ("Special Note: " + payload.special_note) : "Special Note: none";

            document.getElementById("assignmentInfo").textContent =
                "Assigned/Testing donors: "
                + String(payload.assigned_count || 0)
                + " / "
                + String(payload.max_assignable || 3)
                + " (hard limit)";

            ALL_DONORS = Array.isArray(payload.donors) ? payload.donors : [];
            applyFilters();
            document.getElementById("donorsStatus").textContent = "";
        })
        .catch(function() {
            document.getElementById("donorsStatus").textContent = "Failed to load donors.";
        });
}

function assignDonor(donorId) {
    fetch(API_BASE + "/admin/allocate-donor/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ request_id: Number(REQUEST_ID), donor_id: Number(donorId) })
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
        if (!result.ok) {
            alert(result.data && result.data.message ? result.data.message : "Failed to allocate donor.");
            return;
        }

        alert("Donor assigned successfully.");
        loadDonors();
    })
    .catch(function() {
        alert("Failed to allocate donor.");
    });
}

function allotInventory(id) {
    if (!confirm("No donors found. Would you like to fulfill this request by allotting units from the blood bank inventory?")) return;
    
    fetch(API_BASE + "/admin/requests/" + id + "/allot-inventory/", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
        if (!result.ok) {
            alert(result.data && result.data.message ? result.data.message : "Failed to allot from inventory");
            return;
        }
        alert("Success: Units allotted from inventory. Request completed.");
        window.location.href = "admin-requests.html";
    })
    .catch(function() {
        alert("Server error during inventory allotment.");
    });
}

if (localStorage.getItem("userRole") !== "admin") {
    alert("Unauthorized access!");
    window.location.href = "login.html";
}

["sortField", "sortOrder", "highestScoreOnly"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
        el.addEventListener("change", applyFilters);
    }
});

loadDonors();
</script>

</body>
</html>
