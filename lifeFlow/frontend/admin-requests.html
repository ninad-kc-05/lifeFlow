<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow – Admin Blood Requests</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
      <img src="logo.jpeg" alt="LifeFlow" />
    </div>
    <div class="nav-links">
      <button onclick="goAdminDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container card-panel card-wide card-table-wide">
    <h2 class="section-title">Blood <span>Requests</span></h2>
    <p class="text-muted mt-sm">Manage blood requests and search for matching donors.</p>

    <table style="width:100%; border-collapse:collapse; font-size:0.9rem; margin-top:1rem;">
      <thead>
        <tr style="text-align:left; border-bottom:1px solid #1f2937;">
          <th style="padding:0.5rem 0.25rem;">Request ID</th>
          <th style="padding:0.5rem 0.25rem;">Hospital ID</th>
          <th style="padding:0.5rem 0.25rem;">Patient</th>
          <th style="padding:0.5rem 0.25rem;">Blood</th>
          <th style="padding:0.5rem 0.25rem;">Units</th>
          <th style="padding:0.5rem 0.25rem;">Status</th>
          <th style="padding:0.5rem 0.25rem;">Action</th>
        </tr>
      </thead>
      <tbody id="requestsBody"></tbody>
    </table>
    <p id="requestsStatus" class="text-muted mt-sm"></p>
  </div>

  <div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    var API_BASE = "http://127.0.0.1:8000/api";

    function goHome() { window.location.href = "index.html"; }
    function goAdminDashboard() { window.location.href = "admin-dashboard.html"; }

    function badgeClass(status) {
      if (status === "ASSIGNED" || status === "ALLOCATED") return "approved";
      if (status === "COMPLETED") return "completed";
      return "pending";
    }

    function renderRequests(items) {
      var tbody = document.getElementById("requestsBody");
      if (!Array.isArray(items) || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="padding:0.6rem 0.25rem;">No requests found.</td></tr>';
        return;
      }

      items = items.filter(function(item) {
        var statusText = String(item.status || "").toUpperCase();
        return statusText !== "REJECTED" && statusText !== "CANCELLED";
      });

      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="padding:0.6rem 0.25rem;">No active requests found.</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(function(item) {
        var statusText = String(item.status || "PENDING");
        var badge = '<span class="status-badge ' + badgeClass(statusText) + '">' + statusText + '</span>';

        var action = '-';
        if (statusText === "PENDING") {
          action = '<button class="btn btn-primary btn-sm" onclick="markAsRead(' + item.id + ')">Mark as Read</button>';
        } else if (statusText === "DONOR_NEEDED") {
          action = '<button class="btn btn-primary btn-sm" onclick="searchDonor(' + item.id + ')">Search for Donor</button>';
        } else if (statusText === "ASSIGNED" || statusText === "ALLOCATED") {
          action = 'Donor assigned';
        }

        return '<tr>'
          + '<td style="padding:0.45rem 0.25rem;">#' + item.id + '</td>'
          + '<td style="padding:0.45rem 0.25rem;">' + (item.hospital_id || "-") + '</td>'
          + '<td style="padding:0.45rem 0.25rem;">' + (item.patient_name || "-") + '</td>'
          + '<td style="padding:0.45rem 0.25rem;">' + (item.blood_group || "-") + '</td>'
          + '<td style="padding:0.45rem 0.25rem;">' + (item.units || 0) + '</td>'
          + '<td style="padding:0.45rem 0.25rem;">' + badge + '</td>'
          + '<td style="padding:0.45rem 0.25rem;">' + action + '</td>'
          + '</tr>';
      }).join('');
    }

    function loadRequests() {
      document.getElementById("requestsStatus").textContent = "Loading requests...";
      fetch(API_BASE + "/admin/requests/")
        .then(function(res) { return res.json(); })
        .then(function(items) {
          renderRequests(items);
          document.getElementById("requestsStatus").textContent = "";
        })
        .catch(function() {
          document.getElementById("requestsStatus").textContent = "Failed to load requests.";
        });
    }

    function markAsRead(id) {
      fetch(API_BASE + "/admin/requests/" + id + "/mark-read/", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
      })
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
          if (!result.ok) {
            alert(result.data && result.data.message ? result.data.message : "Failed to mark as read");
            return;
          }
          loadRequests();
        })
        .catch(function() {
          alert("Failed to mark as read");
        });
    }

    function searchDonor(id) {
      fetch(API_BASE + "/admin/requests/" + id + "/search-donor/", {
        method: "POST",
        headers: { "Content-Type": "application/json" }
      })
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
          if (!result.ok) {
            alert(result.data && result.data.message ? result.data.message : "Failed to search donor");
            return;
          }

          window.location.href = "available_donors.html?request_id=" + encodeURIComponent(String(id));
        })
        .catch(function() {
          alert("Failed to search donor");
        });
    }

    if (localStorage.getItem("userRole") !== "admin") {
      alert("Unauthorized access!");
      window.location.href = "login.html";
    }

    loadRequests();
  </script>
</body>
</html>
