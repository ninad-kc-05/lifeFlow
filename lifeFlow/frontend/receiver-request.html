<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow – New Blood Request</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-top">
        <div class="logo" onclick="goHome()">
      <img src="logo.jpeg" alt="LifeFlow" />
    </div>
    <div class="nav-links">
      <button onclick="goReceiverDashboard()">Back to Dashboard</button>
    </div>
  </div>

  <div class="container card-panel card-narrow">
    <h2 class="text-center">New Blood Request</h2>
    <p class="text-muted mt-sm text-center">Create a new blood request for your hospital.</p>

    <label>Patient Name</label>
    <input id="patientName" type="text" placeholder="Patient name" />

    <label>Patient Age</label>
    <input id="patientAge" type="number" min="1" max="120" placeholder="Patient age" />

    <label>Blood Group</label>
    <select id="bloodGroup">
      <option value="" disabled selected>Select Blood Group</option>
      <option value="A+">A+</option>
      <option value="A-">A-</option>
      <option value="B+">B+</option>
      <option value="B-">B-</option>
      <option value="O+">O+</option>
      <option value="O-">O-</option>
      <option value="AB+">AB+</option>
      <option value="AB-">AB-</option>
    </select>

    <label>Component Type</label>
    <select id="componentType">
      <option value="" disabled selected>Select Component</option>
      <option value="whole_blood">Whole Blood</option>
      <option value="plasma">Plasma</option>
      <option value="platelets">Platelets</option>
    </select>

    <label>Units Needed</label>
    <input id="unitsNeeded" type="number" min="1" max="10" value="2" />

    <label>Urgency</label>
    <select id="urgency">
      <option value="normal">Normal</option>
      <option value="urgent">Urgent</option>
      <option value="emergency">Emergency</option>
    </select>

    <label>Required By</label>
    <input id="requiredBy" type="date" />

    <label>Special Note (Optional)</label>
    <textarea id="specialNote" placeholder="Any eligibility note, urgency detail, or special instruction"></textarea>

    <button class="btn btn-primary" style="width:100%; margin-top:0.5rem;" onclick="submitRequest()">Submit Request</button>
    <p id="statusMsg" class="text-muted mt-sm" style="font-size:0.85rem;"></p>
  </div>

  <div class="footer">
    © 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    var API_BASE = "http://127.0.0.1:8000/api";

    function goHome() { window.location.href = "index.html"; }
    function goReceiverDashboard() { window.location.href = "receiver-dashboard.html"; }

    function getHospitalIdFromUrl() {
      var params = new URLSearchParams(window.location.search);
      var fromUrl = params.get("hospital_id");
      if (fromUrl) {
        localStorage.setItem("hospital_id", fromUrl);
        return fromUrl;
      }
      return localStorage.getItem("hospital_id");
    }

    function setStatus(message, isError) {
      var el = document.getElementById("statusMsg");
      el.textContent = message || "";
      el.style.color = isError ? "#ef4444" : "var(--color-text-muted)";
    }

    function submitRequest() {
      var hospitalId = getHospitalIdFromUrl();
      var payload = {
        patient_name: document.getElementById("patientName").value.trim(),
        patient_age: parseInt(document.getElementById("patientAge").value, 10) || 0,
        blood_group: document.getElementById("bloodGroup").value,
        component_type: document.getElementById("componentType").value,
        units: parseInt(document.getElementById("unitsNeeded").value, 10) || 1,
        urgency: document.getElementById("urgency").value,
        required_by: document.getElementById("requiredBy").value,
        hospital_id: parseInt(hospitalId, 10) || null,
        special_note: document.getElementById("specialNote").value.trim()
      };

      if (!payload.hospital_id) {
        setStatus("Missing hospital_id. Please ensure URL has ?hospital_id=X parameter.", true);
        return;
      }

      if (!payload.patient_name || !payload.blood_group || !payload.component_type || !payload.units || !payload.urgency || !payload.required_by) {
        setStatus("Please fill all required fields.", true);
        return;
      }

      fetch(API_BASE + "/requests/create/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
          if (!result.ok) {
            setStatus(result.data && result.data.message ? result.data.message : "Failed to create request.", true);
            return;
          }

          setStatus("Request created successfully.", false);
          alert("Request created successfully.");
          window.location.href = "receiver-requests.html?hospital_id=" + encodeURIComponent(String(payload.hospital_id));
        })
        .catch(function() {
          setStatus("Server error while creating request.", true);
        });
    }

    if (localStorage.getItem("userRole") !== "receiver") {
      alert("Unauthorized access!");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
