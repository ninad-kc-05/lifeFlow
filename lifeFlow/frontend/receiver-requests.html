<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeFlow - My Requests</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="logo" onclick="goHome()">
        <img src="logo.jpeg" alt="LifeFlow" />
      </div>
      <div class="nav-links">
        <button onclick="goReceiverDashboard()">Back to Dashboard</button>
      </div>
    </div>
  </div>

  <div class="container" style="max-width:1100px;">
    <h2 class="section-title" style="text-align:center; margin-bottom:1rem;">My <span>Requests</span></h2>
    <p id="statusMsg" class="text-muted" style="text-align:center; font-size:0.85rem; margin-bottom:0.75rem;"></p>

    <div class="requests-split">
      <div class="card-panel">
        <h3 style="color:var(--color-primary); font-size:1rem; margin-bottom:0.5rem;">Urgent</h3>
        <table class="split-table">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Group</th>
              <th>Units</th>
              <th>Status</th>
              <th>Information</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="urgentRows">
            <tr><td colspan="6" class="text-muted" style="font-size:0.82rem;">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="card-panel">
        <h3 style="color:var(--color-accent); font-size:1rem; margin-bottom:0.5rem;">Normal</h3>
        <table class="split-table">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Group</th>
              <th>Units</th>
              <th>Status</th>
              <th>Information</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="normalRows">
            <tr><td colspan="6" class="text-muted" style="font-size:0.82rem;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer">
    &copy; 2025 LifeFlow | Blood Donation Management System
  </div>

  <script>
    var API_BASE = "http://127.0.0.1:8000/api";

    function goHome() { window.location.href = "index.html"; }
    function goReceiverDashboard() { window.location.href = "receiver-dashboard.html"; }
    function goToAllocatedPatients() { window.location.href = "Allocated_patient_details.html"; }

    function getHospitalId() {
      var params = new URLSearchParams(window.location.search);
      var fromUrl = params.get("hospital_id");
      if (fromUrl) {
        localStorage.setItem("hospital_id", fromUrl);
        return fromUrl;
      }
      return localStorage.getItem("hospital_id");
    }

    function statusBadge(status) {
      if (status === "donor_needed") return '<span class="status-badge pending">Searching for Donors</span>';
      if (status === "assigned" || status === "allocated") return '<span class="status-badge approved">Assigned</span>';
      if (status === "approved") return '<span class="status-badge approved">Approved</span>';
      if (status === "completed") return '<span class="status-badge completed">Completed</span>';
      return '<span class="status-badge pending">Pending</span>';
    }

    function actionCell(status) {
      if (status === "donor_needed") {
        return '<span class="text-muted" style="font-size:0.8rem; font-weight:600;">Searching for donors</span>';
      }
      if (status === "assigned" || status === "allocated") {
        return '<span style="color:#22c55e; font-weight:600; font-size:0.8rem;">Donor Assigned</span>';
      }
      if (status === "approved") {
        return '<button class="btn btn-primary btn-sm" onclick="goToAllocatedPatients()">Allocated Patient</button>';
      }
      if (status === "completed") {
        return '<span style="color:#22c55e; font-weight:600; font-size:0.8rem;">Donation Completed</span>';
      }
      return '<span class="text-muted" style="font-size:0.8rem; font-weight:600;">Pending</span>';
    }

    function infoCell(item) {
      var created = item.created_at ? new Date(item.created_at) : null;
      if (!created || isNaN(created.getTime())) return "Requested: -";
      return "Requested: " + created.toLocaleString();
    }

    function rowHtml(item) {
      return (
        "<tr>" +
          "<td>" + item.patient_name + "</td>" +
          "<td>" + item.blood_group + "</td>" +
          "<td>" + item.units + "</td>" +
          "<td>" + statusBadge(item.status) + "</td>" +
          '<td class="text-muted" style="font-size:0.8rem;">' + infoCell(item) + "</td>" +
          "<td>" + actionCell(item.status) + "</td>" +
        "</tr>"
      );
    }

    function renderRows(allItems) {
      var urgentBody = document.getElementById("urgentRows");
      var normalBody = document.getElementById("normalRows");

      var urgentItems = allItems.filter(function(item) {
        return item.urgency === "urgent" || item.urgency === "emergency";
      });
      var normalItems = allItems.filter(function(item) {
        return item.urgency === "normal";
      });

      urgentBody.innerHTML = urgentItems.length
        ? urgentItems.map(rowHtml).join("")
        : '<tr><td colspan="6" class="text-muted" style="font-size:0.82rem;">No urgent requests found.</td></tr>';

      normalBody.innerHTML = normalItems.length
        ? normalItems.map(rowHtml).join("")
        : '<tr><td colspan="6" class="text-muted" style="font-size:0.82rem;">No normal requests found.</td></tr>';
    }

    function loadRequests() {
      var hospitalId = getHospitalId();
      fetch(API_BASE + "/requests/")
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
          if (!result.ok) {
            document.getElementById("statusMsg").textContent = "Failed to load requests.";
            document.getElementById("statusMsg").style.color = "#ef4444";
            return;
          }

          var items = Array.isArray(result.data) ? result.data : [];
          if (hospitalId) {
            items = items.filter(function(item) { return String(item.hospital_id) === String(hospitalId); });
          }

          items = items.filter(function(item) {
            return item.status !== "rejected" && item.status !== "cancelled";
          });

          renderRows(items);
          document.getElementById("statusMsg").textContent = "";
        })
        .catch(function() {
          document.getElementById("statusMsg").textContent = "Server error while loading requests.";
          document.getElementById("statusMsg").style.color = "#ef4444";
        });
    }

    if (localStorage.getItem("userRole") !== "receiver") {
      alert("Unauthorized access!");
      window.location.href = "login.html";
    } else {
      loadRequests();
    }
  </script>
</body>
</html>
